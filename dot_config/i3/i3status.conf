general {
  colors = false
  interval = 1
  color_good = '#71B89D'
  color_degraded = '#71B89D'
  color_bad = '#8C3A6A'
}

order += "disk /"
order += "disk /home"
order += "wireless wlp58s0"
order += "volume master"
order += "battery 0"
order += "tztime local"

disk "/" {
        format = " / %free "
}

disk "/home" {
        format = " /home %free "
}

wireless wlp58s0 {
        format_up = " (%essid) %ip "
        format_down = " wifi down "
}

battery 0 {
        format = " ⚡ %status %percentage "
        format_down = ""
}

tztime local {
        format = " ⌚ %Y-%m-%d %H:%M:%S "
}

volume master {
        format = " ♪ %volume "
        format_muted = "♪: muted (%volume)"
        device = "pulse"
}
