font_family Fira Code
font_size 10

adjust_line_height 125%

cursor_shape underline

enable_audio_bell no

window_border_width 0

foreground #ffffff
background #282828
background_opacity  0.99

active_tab_foreground   #f1f1f1
active_tab_background   #222222
active_tab_font_style   bold-italic
inactive_tab_background #282828
inactive_tab_foreground #333333

map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+k next_tab
map ctrl+shift+j previous_tab

color0  #3B4252
color1  #BF616A
color2  #A3BE8C
color3  #EBCB8B
color4  #81A1C1
color5  #B48EAD
color6  #88C0D0
color7  #E5E9F0
color8  #4C566A
color9  #BF616A
color10 #A3BE8C
color11 #EBCB8B
color12 #81A1C1
color13 #B48EAD
color14 #8FBCBB
color15 #ECEFF4
